<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="page-header">
        <h1>OUR WORK</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">
        <div class="carousel" id="portfolioCarousel">
            <img src="images/project1.jpg" class="active" alt="Project 1">
            <img src="images/project2.jpg" alt="Project 2">
            <img src="images/project3.jpg" alt="Project 3">
            <img src="images/project4.jpg" alt="Project 4">
            <img src="images/project5.jpg" alt="Project 5">
            <img src="images/project6.jpg" alt="Project 6">
            <img src="images/project7.jpg" alt="Project 7">
            <img src="images/project8.jpg" alt="Project 8">
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let currentIndex = 0;
            const images = document.querySelectorAll('#portfolioCarousel img');
            
            if (images.length > 0) {
                setInterval(function() {
                    // Remove active class from current image (fades it out)
                    images[currentIndex].classList.remove('active');
                    
                    // Move to next image index
                    currentIndex = (currentIndex + 1) % images.length;
                    
                    // Add active class to next image (fades it in)
                    images[currentIndex].classList.add('active');
                }, 3000); // Transitions every 3 seconds
            }
        });
    </script>
</body>
</html>
