<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .carousel { 
            position: relative; 
            max-width: 800px; 
            margin: 40px auto; 
            height: 500px; 
            background: #111b27;
            border: 4px solid #23364f;
            border-radius: 8px;
            overflow: hidden;
        }
        /* Hide images by default */
        .carousel img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: none; 
        }
        /* Display only the active image */
        .carousel img.active { 
            display: block; 
        }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>OUR WORK</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">
        <div class="carousel" id="portfolioCarousel">
            <img src="images/project1.jpg" class="active" alt="Project 1">
            <img src="images/project2.jpg" alt="Project 2">
            <img src="images/project3.jpg" alt="Project 3">
            <img src="images/project4.jpg" alt="Project 4">
            <img src="images/project5.jpg" alt="Project 5">
            <img src="images/project6.jpg" alt="Project 6">
            <img src="images/project7.jpg" alt="Project 7">
            <img src="images/project8.jpg" alt="Project 8">
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let currentIndex = 0;
            const images = document.querySelectorAll('#portfolioCarousel img');
            
            if(images.length > 0) {
                setInterval(function() {
                    images[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % images.length;
                    images[currentIndex].classList.add('active');
                }, 3000);
            }
        });
    </script>
</body>
</html>
