<body>

   <header class="page-header">
        <img src="images/logo.png" alt="Bonner Builders Logo" class="header-logo" style="height: 60px; width: auto; float: left; margin-right: 15px;">
        <h1>OUR WORK</h1>
        <div class="header-contact">

            <p>✉️ bonnerbuilders@gmail.com</p>
            <p>📍 Lakes Region, NH</p>
        </div>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">
        <h2>Our Featured Projects</h2>
        <p>Take a look at some of our recent custom carpentry, framing, and remodeling work across the Lakes Region.</p>
        
        <div class="carousel">
            <img src="images/project1.jpg" alt="Project 1" class="active">
            <img src="images/project2.jpg" alt="Project 2">
            <img src="images/project3.jpg" alt="Project 3">
            <img src="images/project4.jpg" alt="Project 4">
            <img src="images/project5.jpg" alt="Project 5">
            <img src="images/project6.jpg" alt="Project 6">
            <img src="images/project7.jpg" alt="Project 7">
            <img src="images/project8.jpg" alt="Project 8">
        </div>
    </main>

    <script>
        const images = document.querySelectorAll('.carousel img');
        let currentIndex = 0;

        function changeImage() {
            // Remove active class from current image
            images[currentIndex].classList.remove('active');
            
            // Move to next image, looping back to 0 at the end
            currentIndex = (currentIndex + 1) % images.length;
            
            // Add active class to new image
            images[currentIndex].classList.add('active');
        }

        // Change images every 3 seconds (3000 milliseconds)
        setInterval(changeImage, 3000);
    </script>

</body>
