<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .carousel { position: relative; max-width: 800px; margin: auto; height: 400px; overflow: hidden; }
        .carousel img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .carousel img.active { opacity: 1; }
    </style>
</head>
<body>
<header class="page-header">
    <h1>Portfolio</h1> </header>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">
        <h2>OUR WORK</h2>
        <div class="carousel" id="portfolioCarousel">
            <img src="images/Bonner_Builders_007.JPG" class="active" alt="Project 1">
            <img src="images/Bonner_Builders_008.JPG" alt="Project 2">
            <img src="images/Bonner_Builders_009.JPG" alt="Project 3">
            <img src="images/Bonner_Builders_011.JPG" alt="Project 4">
            <img src="images/Bonner_Builders_017.JPG" alt="Project 5">
            <img src="images/Bonner_Builders_018.JPG" alt="Project 6">
            <img src="images/Bonner_Builders_019.JPG" alt="Project 7">
            <img src="images/Bonner_Builders_020.JPG" alt="Project 8">
        </div>
    </main>

    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('#portfolioCarousel img');
        function rotateImages() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }
        setInterval(rotateImages, 3000); // Changes image every 3 seconds
    </script>
</body>
</html>
