    <div class="container">
        <h2>OUR WORK</h2>
        <p>A look at some of the custom projects we have completed in the Lakes Region.</p>

        <div class="carousel">
            <div class="carousel-inner" id="carousel">
                <img src="images/project1.jpg" alt="Project 1">
                <img src="images/project2.jpg" alt="Project 2">
                <img src="images/project3.jpg" alt="Project 3">
            </div>
        </div>
    </div>

    <script>
        let index = 0;
        const images = document.getElementById('carousel').children;
        function showNext() {
            images[index].style.display = 'none';
            index = (index + 1) % images.length;
            images[index].style.display = 'block';
        }
        // Initialize
        for(let i = 1; i < images.length; i++) images[i].style.display = 'none';
        setInterval(showNext, 3000); // Changes every 3 seconds
    </script>
