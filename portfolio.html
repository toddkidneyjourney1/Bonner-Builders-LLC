.<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-side">
            <img src="images/logo.png" alt="Bonner Builders Logo">
        </div>
        <div class="header-info">
            <h3>Bonner Builders LLC</h3>
            <p>📞 (603) 707-0049</p>
            <p>✉️ bonnerbuilders@yahoo.com</p>
            <p>📍 Lakes Region, NH</p>
        </div>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="services.html">Services</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>

    <div class="container">
        <h2>Our Featured Projects</h2>
        <p>Explore our recent custom carpentry and remodeling work.</p>
        
        <div class="slider-container">
            <div class="slider">
                <div class="slide"><img src="images/pool (2).JPG" alt="Project 2"></div>
                <div class="slide"><img src="images/pool (3).JPG" alt="Project 3"></div>
                <div class="slide"><img src="images/pool (4).JPG" alt="Project 4"></div>
                <div class="slide"><img src="images/pool (5).JPG" alt="Project 5"></div>
                <div class="slide"><img src="images/pool (6).JPG" alt="Project 6"></div>
                <div class="slide"><img src="images/pool (7).JPG" alt="Project 7"></div>
                <div class="slide"><img src="images/pool (8).JPG" alt="Project 8"></div>
                <div class="slide"><img src="images/pool (9).JPG" alt="Project 9"></div>
                <div class="slide"><img src="images/pool (10).JPG" alt="Project 10"></div>
                <div class="slide"><img src="images/pool (11).JPG" alt="Project 11"></div>
                <div class="slide"><img src="images/pool (12).JPG" alt="Project 12"></div>
                <div class="slide"><img src="images/pool (13).JPG" alt="Project 13"></div>
            </div>
            <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
            <button class="next" onclick="changeSlide(1)">&#10095;</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        function changeSlide(direction) {
            const slider = document.querySelector('.slider');
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
    </script>
</body>
</html>
