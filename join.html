<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-side">
            <img src="images/logo.png" alt="Bonner Builders Logo">
        </div>
        <div class="header-info">
            <h3>Bonner Builders LLC</h3>
            <p>📞 (603) 707-0049</p>
        </div>
    </header>

    <main>
        <h1>Join Our Team</h1>
        
        <!-- This is the only form on the page -->
        <form action="https://api.staticforms.dev/submit" method="POST">
            <!-- Remember to insert your actual Access Key below -->
            <input type="hidden" name="accessKey" value="YOUR_ACCESS_KEY_HERE">
            <input type="hidden" name="redirectTo" value="https://toddkidneyjourney1.github.io/Bonner-Builders-LLC/thank-you.html">

            <div class="form-group">
                <label for="name">Full Name*</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address*</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number*</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="availability">Availability (e.g., Start Date, Days/Hours)*</label>
                <input type="text" id="availability" name="availability" required>
            </div>

            <div class="form-group">
                <label for="motivation">Why do you want to work with Bonner Builders?*</label>
                <textarea id="motivation" name="motivation" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="trade">Primary Specialty</label>
                <select id="trade" name="trade" required>
                    <option value="" disabled selected>Select your trade</option>
                    <option value="framer">Skilled Framer</option>
                    <option value="carpenter">Finish Carpenter</option>
                    <option value="both">Both / General Lead</option>
                </select>
            </div>

            <button type="submit">Submit Application</button>
        </form>
    </main>

</body>
</html>
