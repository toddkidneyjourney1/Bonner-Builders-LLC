<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <header class="page-header">
        <img src="images/logo.png" alt="Bonner Builders Logo" class="header-logo" style="height: 60px; width: auto; float: left; margin-right: 15px;">
        <h1>JOIN OUR TEAM</h1>
        
        <div class="header-contact">
            <p>📞 (603) 539-7512</p>
            <p>✉️ bonnerbuilders@gmail.com</p>
            <p>📍 Lakes Region, NH</p>
        </div>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html" class="active">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">
        <h2>Employment Opportunities</h2>
        <p>We are always looking for skilled craftsmen to join the Bonner Builders team. Tell us about your experience below.</p>
        
        <form class="join-form">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="experience">Trade / Years of Experience:</label>
            <input type="text" id="experience" name="experience" required>
            
            <label for="message">Why do you want to work with us?</label>
            <textarea id="message" name="message" required></textarea>
            
            <button type="submit">Submit Application</button>
        </form>
    </main>

</body>
</html>
