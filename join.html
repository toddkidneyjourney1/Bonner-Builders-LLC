<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Team | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Form Styling */
        form { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin-top: 20px; }
        label { font-weight: bold; }
        input, textarea, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background-color: #c5a059; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background-color: #a8874a; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="services.html">SERVICES</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="testimonials.html">TESTIMONIALS</a>
        <a href="join.html">JOIN OUR TEAM</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="container">
        <h2>WORK WITH US</h2>
        <p>Interested in joining the Bonner Builders team? Tell us about your experience below.</p>

        <form action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Years of Carpentry Experience</label>
            <select name="experience">
                <option value="0-2">0-2 Years</option>
                <option value="3-5">3-5 Years</option>
                <option value="5+">5+ Years</option>
            </select>

            <label>Message / Skills</label>
            <textarea name="message" rows="5" required></textarea>

            <button type="submit">SUBMIT APPLICATION</button>
        </form>
    </div>

</body>
</html>
