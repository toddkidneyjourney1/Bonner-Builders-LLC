    <main class="container">
        <h2>Join Our Team</h2>
        <p>We are always looking for skilled craftsmen to join the Bonner Builders family. Please fill out the inquiry form below to get in touch with us.</p>
        
        <form action="mailto:your-email@example.com" method="post" enctype="text/plain">
            <label for="name">Full Name *</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="experience">Years of Experience *</label><br>
            <input type="number" id="experience" name="experience" required><br><br>

            <label for="trade">Primary Trade / Skill *</label><br>
            <input type="text" id="trade" name="trade" required><br><br>

            <label for="message">About Your Experience *</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>

            <button type="submit">SUBMIT APPLICATION</button>
        </form>
    </main>

</body>
