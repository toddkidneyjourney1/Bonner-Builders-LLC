<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .join-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .join-form label { display: block; margin-top: 15px; font-weight: bold; }
        .join-form input, .join-form textarea { width: 100%; padding: 10px; margin-top: 5px; }
        .join-form button { margin-top: 20px; padding: 10px 20px; background: #c5a059; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>JOIN OUR TEAM</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html" class="active">Join Us</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="join-container">
        <p>We are always looking for skilled craftsmen to join the Bonner Builders team. Tell us about your experience below.</p>
        
        <form class="join-form" action="mailto:your-email@example.com" method="post" enctype="text/plain">
            <label>Full Name:</label>
            <input type="text" name="name" required>
            
            <label>Trade / Years of Experience:</label>
            <input type="text" name="experience" required>
            
            <label>Why do you want to work with us?</label>
            <textarea name="message" rows="5" required></textarea>
            
            <button type="submit">SUBMIT APPLICATION</button>
        </form>
    </main>

</body>
</html>
