<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-container {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 40px auto;
            /* Black box styling */
            background-color: #1a1a1a; 
            border: 2px solid #c5a059;
            border-radius: 8px;
        }
        .thank-you-container h1 {
            color: #c5a059; /* Gold text */
            margin-bottom: 20px;
        }
        .thank-you-container p {
            font-size: 1.2rem;
            color: #ffffff; /* White text for better readability on black */
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            background-color: #c5a059;
            color: #1a1a1a;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-side">
            <img src="images/logo.png" alt="Bonner Builders Logo">
        </div>
    </header>

    <main class="thank-you-container">
        <h1>Message Received!</h1>
        <p>Thank you for reaching out to Bonner Builders. We appreciate your interest in joining our team. We've received your application and will review it shortly.</p>
        <a href="index.html" class="btn-home">Return to Home Page</a>
    </main>

    <footer>
        <p>&copy; 2026 Bonner Builders LLC. All rights reserved.</p>
    </footer>

</body>
</html>
