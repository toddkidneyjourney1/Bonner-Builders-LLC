<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ensures the container is white and readable against the navy background */
        .container { background: white; padding: 30px; border-radius: 8px; color: #333; max-width: 600px; margin: 40px auto; }
        
        /* Form element spacing and styling */
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        label { font-weight: bold; color: #1c2d42; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px; background-color: #c5a059; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #a8874a; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="services.html">SERVICES</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="testimonials.html">TESTIMONIALS</a>
        <a href="join.html">JOIN OUR TEAM</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="container">
        <h2>CONTACT US</h2>
        <p>Have a project in mind? We'd love to hear from you. Fill out the form below and we will get back to you shortly.</p>

        <form action="https://formspree.io/f/YOUR_CONTACT_FORM_ID" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="message">General Questions / Comments</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">SEND MESSAGE</button>
        </form>
    </div>

</body>
</html>
