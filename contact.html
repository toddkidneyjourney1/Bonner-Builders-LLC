<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bonner Builders LLC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .contact-form label { display: block; margin-top: 15px; font-weight: bold; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 10px; margin-top: 5px; }
        .contact-form button { margin-top: 20px; padding: 10px 20px; background: #c5a059; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header class="page-header">
        <img src="images/logo.png" alt="Bonner Builders Logo" class="header-logo">
        <h1>ABOUT US</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="testimonials.html">Testimonials</a>
        <a href="join.html">Join Us</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <main class="contact-container">
        <p>Ready to start your next project? Fill out the form below and we will get back to you shortly.</p>
        
        <form class="contact-form" action="mailto:your-email@example.com" method="post" enctype="text/plain">
            <label>Name:</label>
            <input type="text" name="name" required>
            
            <label>Email:</label>
            <input type="email" name="email" required>
            
            <label>Message:</label>
            <textarea name="message" rows="5" required></textarea>
            
            <button type="submit">SEND MESSAGE</button>
        </form>
    </main>

</body>
</html>
